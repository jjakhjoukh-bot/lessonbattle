services:
  - type: web
    name: lesson-battle
    runtime: node
    plan: free
    buildCommand: npm install && npm --prefix client install && npm run build
    startCommand: npm run server
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: TEACHER_USERNAME
        sync: false
      - key: TEACHER_PASSWORD
        sync: false
